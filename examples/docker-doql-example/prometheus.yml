global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'load-balancer'
    static_configs:
      - targets: ['load-balancer:80']
  
  - job_name: 'app-servers'
    static_configs:
      - targets: ['app-server-1:8000', 'app-server-2:8000']
  
  - job_name: 'database'
    static_configs:
      - targets: ['database:5432']
  
  - job_name: 'cache'
    static_configs:
      - targets: ['cache:6379']
  
  - job_name: 'message-queue'
    static_configs:
      - targets: ['message-queue:5672']
